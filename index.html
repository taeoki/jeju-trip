<script>
document.getElementById('pwInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') decrypt();
});

async function decrypt() {
  const pw = document.getElementById('pwInput').value;
  try {
    const data = JSON.parse(document.getElementById('encData').textContent);
    const salt = Uint8Array.from(atob(data.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(data.iv), c => c.charCodeAt(0));
    const tag = Uint8Array.from(atob(data.tag), c => c.charCodeAt(0));
    const ciphertext = Uint8Array.from(atob(data.ciphertext), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
    const derivedBits = await crypto.subtle.deriveBits({name:'PBKDF2', salt:salt, iterations:100000, hash:'SHA-256'}, keyMaterial, 256);
    const key = await crypto.subtle.importKey('raw', derivedBits, {name:'AES-GCM'}, false, ['decrypt']);

    const combined = new Uint8Array(ciphertext.length + tag.length);
    combined.set(ciphertext);
    combined.set(tag, ciphertext.length);

    const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv, tagLength:128}, key, combined);
    const html = new TextDecoder().decode(decrypted);

    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appContainer').innerHTML = html;

    // Execute any scripts in the decrypted content
    document.getElementById('appContainer').querySelectorAll('script').forEach(function(oldScript) {
      var newScript = document.createElement('script');
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  } catch(e) {
    const err = document.getElementById('pwError');
    err.style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').style.borderColor = '#EF4444';
    setTimeout(() => { err.style.display = 'none'; document.getElementById('pwInput').style.borderColor = '#E5E7EB'; }, 2000);
  }
}
</script>
